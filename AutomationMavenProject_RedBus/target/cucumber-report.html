window.CUCUMBER_MESSAGES = [{"meta":{"protocolVersion":"22.0.0","implementation":{"name":"cucumber-jvm","version":"7.15.0"},"runtime":{"name":"OpenJDK 64-Bit Server VM","version":"21.0.9+10-LTS"},"os":{"name":"Windows 10"},"cpu":{"name":"amd64"}}},{"testRunStarted":{"timestamp":{"seconds":1774504246,"nanos":79019000}}},{"source":{"uri":"file:///C:/Users/USER/OneDrive/Desktop/cg_training/Sprint/DAY4/AutomationMavenProject/AutomationMavenProject_RedBus/src/test/resources/features/TrainStatus.feature","data":"Feature: Live Train Running Status on RedBus\n  As a user I want to search and track trains and check seat availability\n  So that I can plan and monitor my journey\n\n  Background:\n    Given the user is on the RedBus train running status page\n\n  @ExcelRead\n  Scenario: Verify test data can be loaded from Excel using Apache POI\n    Given the test data is loaded from Excel sheet \"TrainSearchData\"\n\n  # ─────────────────────────────────────────────────────────────────────\n  # STORY 1 — TC_01, TC_02, TC_03, TC_04\n  # Valid search inputs: partial number, exact number, partial name, full name\n  # All 4 rows run independently; each opens browser via Hooks @Before\n  # ─────────────────────────────────────────────────────────────────────\n  Scenario Outline: Search with valid train input and verify details page opens\n    When the user searches for \"<trainInput>\"\n    Then the train details page should be displayed\n\n    Examples:\n      | trainInput       | tcId  | description         |\n      | 123              | TC_01 | Partial number      |\n      | 12301            | TC_02 | Exact train number  |\n      | Rajd             | TC_03 | Partial name string |\n      | Rajdhani Express | TC_04 | Full train name     |\n\n  # ─────────────────────────────────────────────────────────────────────\n  # STORY 1 — TC_07, TC_08\n  # Negative: wrong/non-existent number or string — no suggestions,\n  # Check Status button stays disabled\n  # ─────────────────────────────────────────────────────────────────────\n  Scenario Outline: Search with invalid input keeps Check Status button disabled\n    When the user types \"<invalidInput>\" in the search box\n    Then the Check Status button should be disabled\n\n    Examples:\n      | invalidInput | tcId  | description               |\n      | 99999        | TC_07 | Non-existent train number |\n      | XXXXXX       | TC_08 | Non-existent name string  |\n\n  # ─────────────────────────────────────────────────────────────────────\n  # STORY 3 — TC_16, TC_18, TC_19/TC_20 (seat availability full flow)\n  # Uses DataTable to pass one train number and three action steps cleanly.\n  # Flow: search → details page → availability button → next month → pick date → result\n  # ─────────────────────────────────────────────────────────────────────\n  Scenario: Check seat availability from Top 10 trains list\n    Given the user is on the RedBus train running status page\n    When the user performs availability steps\n      | click availability     |\n      | navigate to next month |\n      | select date            |\n    Then the seat availability result should be displayed\n","mediaType":"text/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"uri":"file:///C:/Users/USER/OneDrive/Desktop/cg_training/Sprint/DAY4/AutomationMavenProject/AutomationMavenProject_RedBus/src/test/resources/features/TrainStatus.feature","feature":{"location":{"line":1,"column":1},"tags":[],"language":"en","keyword":"Feature","name":"Live Train Running Status on RedBus","description":"  As a user I want to search and track trains and check seat availability\n  So that I can plan and monitor my journey","children":[{"background":{"location":{"line":5,"column":3},"keyword":"Background","name":"","description":"","steps":[{"location":{"line":6,"column":5},"keyword":"Given ","keywordType":"Context","text":"the user is on the RedBus train running status page","id":"ccba38da-176d-4af6-8c54-c0b88ebeba2b"}],"id":"d65ed105-ffc2-48a5-bedb

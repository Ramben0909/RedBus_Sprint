o Outline: Search with invalid input keeps Check Status button disabled\n    When the user types \"<invalidInput>\" in the search box\n    Then the Check Status button should be disabled\n\n    Examples:\n      | invalidInput | tcId  | description               |\n      | 99999        | TC_07 | Non-existent train number |\n      | XXXXXX       | TC_08 | Non-existent name string  |\n\n  # ─────────────────────────────────────────────────────────────────────\n  # STORY 3 — AVAILABILITY FLOW\n  # ─────────────────────────────────────────────────────────────────────\n  @Availability\n  Scenario: Check seat availability from Top 10 trains list\n    When the user performs availability steps\n      | click availability     |\n      | navigate to next month |\n      | select date            |\n    Then the seat availability result should be displayed","mediaType":"text/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"uri":"file:///C:/Users/USER/OneDrive/Desktop/cg_training/Sprint/DAY4/AutomationMavenProject/AutomationMavenProject_RedBus/src/test/resources/features/TrainStatus.feature","feature":{"location":{"line":1,"column":1},"tags":[],"language":"en","keyword":"Feature","name":"Live Train Running Status on RedBus","description":"  As a user I want to search and track trains and check seat availability\n  So that I can plan and monitor my journey","children":[{"background":{"location":{"line":5,"column":3},"keyword":"Background","name":"","description":"","steps":[{"location":{"line":6,"column":5},"keyword":"Given ","keywordType":"Context","text":"the user is on the RedBus train running status page","id":"a1706b6f-2e42-4851-b241-3d238e1aba27"}],"id":"82b52ad2-857a-405f-99ac-d942b6ce8d18"}},{"scenario":{"location":{"line":12,"column":3},"tags":[{"location":{"line":11,"column":3},"name":"@ExcelRead","id":"ad38f35a-3e70-4e15-8c43-313593b1c21c"}],"keyword":"Scenario","name":"Verify test data can be loaded from Excel using Apache POI","description":"","steps":[{"location":{"li
